name: Broken link
description: Report a broken or out-of-date link in the README.
title: "[broken link]: "
labels: ["broken-links"]
body:
  - type: input
    id: section
    attributes:
      label: Section
      description: Which section of `README.md` contains the broken link?
      placeholder: Templates
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: The exact URL that no longer works.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Any extra context (404, redirects to an unrelated page, archived repo, etc.).
    validations:
      required: false
